<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <!--Page Title-->
    <title>Hack-Oeil - Cyrhades CTF</title>
    <!--Meta Keywords and Description-->
    <meta name="keywords" content="">
    <meta name="description" content="">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <link rel="shortcut icon" href="./assets/images/favicon.ico" title="Favicon" />
    <link rel="stylesheet" href="./assets/css/style.css">
    <link href='https://fonts.googleapis.com/css?family=Open+Sans:400,300,600,700,800' rel='stylesheet' type='text/css'>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // 창이 iframe 안에 있는지 확인
            if (window.self !== window.top) {
                document.querySelectorAll('a').forEach((link) => {
                    link.addEventListener('click', (event) => {
                        const a = event.target.closest('a[href^="http"]');
                        if (a) {
                            event.preventDefault();
                            window.parent.postMessage({
                                type: "open-external",
                                url: a.href
                            }, "*");
                        }
                    });
                });
            }
        });
    </script>
</head>

<body>

    <div id="wrapper">
        <!--Main Content Area-->
        <main id="content">
            <!--Ctf-->
            <section class="ctf scrollto">
                <article class="row clearfix">

                        </div>

                </article>

                            </p>
                        </div>
                    </div>
                </article>

                <article>
                    <div class="col-1">

                            <p class="section-subtitle">

                                    href="https://discord.com/channels/1175764392307077120/1175764601716092948">Discord 스레드</a>
                            </p>
                        </div>
                    </div>
                </article>
            </section>
            <!--End of Ctf-->

        <a id="scrollUp" href="#wrapper" style="position: fixed; z-index: 1000;"
            aria-label="맨 위로 돌아가기" title="페이지 상단으로 이동"></a>
